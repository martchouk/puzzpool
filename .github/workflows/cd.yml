name: Deploy to production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd ~/git/puzzpool
            git pull origin main
            ./update.sh
            sudo systemctl restart puzzpool
            # Health check — wait 3 s for process to start, then verify API responds
            sleep 3
            curl -sf https://puzzle.b58.de/api/v1/stats | python3 -c "
            import sys, json
            d = json.load(sys.stdin)
            print('puzzle:', d.get('puzzle', {}).get('name') if d.get('puzzle') else '(none)')
            "
            echo "Deploy complete."

name: Deploy to production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy when CI passes — ci.yml runs first on the same push,
    # but GitHub Actions doesn't natively sequence across workflows.
    # Use a needs: ci pattern or rely on branch protection requiring CI to pass first.

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            cd ~/git/puzzpool
            git pull origin main
            npm ci --production
            sudo systemctl restart puzzpool
            # Health check — wait 3 s for process to start, then verify API responds
            sleep 3
            curl -sf https://puzzle.b58.de/api/v1/stats | jq -r '.puzzle.name // "no puzzle"'
            echo "Deploy complete."

# puzzpool — Nginx reverse proxy configuration
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/puzzpool
#   sudo ln -s /etc/nginx/sites-available/puzzpool /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Prerequisites:
#   - Certbot / Let's Encrypt SSL certificate for your domain
#   - Node.js server running on 127.0.0.1:8888 (puzzpool.service)

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name puzzle.b58.de;   # <-- replace with your domain

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name puzzle.b58.de;   # <-- replace with your domain

    # --- SSL (managed by Certbot; paths auto-updated by certbot renew) ---
    ssl_certificate     /etc/letsencrypt/live/puzzle.b58.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/puzzle.b58.de/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers ---
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header Referrer-Policy         strict-origin-when-cross-origin;

    # --- activate-puzzle: browser-accessible, auth enforced server-side by ADMIN_TOKEN ---
    location /api/v1/admin/activate-puzzle {
        proxy_pass         http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 16k;
    }

    # --- All other admin routes: IP restriction ---
    # Only allow admin API calls from localhost and your trusted management IP.
    location /api/v1/admin/ {
        allow 127.0.0.1;
        allow ::1;
        # allow 203.0.113.42;  # <-- add your management IP here
        deny all;

        proxy_pass         http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- Public API and dashboard ---
    location / {
        proxy_pass         http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow reasonable payload sizes for submit (private key + address)
        client_max_body_size 16k;

        # Keep connections alive for polling dashboard (3 s interval)
        proxy_read_timeout 30s;
    }
}
